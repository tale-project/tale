<!doctype html>
<html lang="en" suppresshydrationwarning>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="theme-color"
      content="#fcfcfc"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#09090b"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="description"
      content="AI-powered customer service platform. Automate support with intelligent agents, manage conversations, and streamline workflows."
    />
    <title>Tale</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!--
      Inter webfont is bundled via @fontsource/inter (see app/globals.css).
      Do NOT add third-party font/style CDNs here: self-deployed operators
      may run air-gapped, and any external origin is a GDPR data transfer.
    -->
  </head>
  <body class="font-sans antialiased">
    <div id="root"></div>
    <script id="__ENV__">
      window.__ENV__ = '__ENV_PLACEHOLDER__';
      window.__ACCEPT_LANGUAGE__ = '__ACCEPT_LANGUAGE_PLACEHOLDER__';
    </script>
    <script type="module" src="/app/main.tsx"></script>
    <script>
      if (
        location.hostname === 'localhost' ||
        location.hostname === '127.0.0.1'
      ) {
        var s = document.createElement('script');
        s.src = 'https://mcp.figma.com/mcp/html-to-design/capture.js';
        s.async = true;
        document.head.appendChild(s);
      }
    </script>
  </body>
</html>
