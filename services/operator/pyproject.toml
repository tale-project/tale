[project]
name = "tale-operator"
version = "0.1.0"
description = "AI-powered operator service using OpenCode + Playwright MCP"
requires-python = ">=3.11"
dependencies = [
    "fastapi==0.128.5",
    "uvicorn==0.40.0",
    "httpx==0.28.1",
    "pydantic==2.12.5",
    "pydantic-settings==2.12.0",
    "loguru==0.7.3",
    "mcp==1.26.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]
