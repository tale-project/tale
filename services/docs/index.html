<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link
      rel="icon"
      type="image/png"
      href="%BASE_URL%images/favicon-light.png"
    />
    <link
      rel="icon"
      type="image/png"
      href="%BASE_URL%images/favicon-dark.png"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="theme-color" content="#ffffff" />
    <title>Tale documentation</title>
    <meta
      name="description"
      content="Documentation for Tale — the sovereign AI platform."
    />
    <link rel="canonical" href="https://docs.tale.dev/" />
    <meta property="og:url" content="https://docs.tale.dev/" />
    <meta property="og:title" content="Tale documentation" />
    <meta
      property="og:description"
      content="Documentation for Tale — the sovereign AI platform."
    />
    <meta property="og:site_name" content="Tale" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Tale documentation" />
    <meta
      name="twitter:description"
      content="Documentation for Tale — the sovereign AI platform."
    />
    <link
      rel="alternate"
      type="application/rss+xml"
      href="%BASE_URL%llms.txt"
      title="llms.txt"
    />
  </head>
  <body>
    <script>
      // Apply theme synchronously before React hydrates to avoid FOUC.
      // Mirrors logic in @tale/ui ThemeProvider (storage key, system fallback).
      (function () {
        try {
          var stored = localStorage.getItem('tale-theme');
          var theme =
            stored === 'light' || stored === 'dark' || stored === 'system'
              ? stored
              : 'system';
          var resolved =
            theme === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : theme;
          var root = document.documentElement;
          if (resolved === 'dark') root.classList.add('dark');
          root.style.colorScheme = resolved;
        } catch (_e) {
          /* localStorage unavailable; fall through to React default */
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/app/main.tsx"></script>
  </body>
</html>
