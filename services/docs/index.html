<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link rel="icon" href="%BASE_URL%favicon.ico" sizes="any" />
    <link
      id="favicon-light"
      rel="icon"
      type="image/png"
      href="%BASE_URL%favicon-light.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      id="favicon-dark"
      rel="icon"
      type="image/png"
      href="%BASE_URL%favicon-dark.png"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      id="theme-color"
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      id="theme-color-dark"
      name="theme-color"
      content="#0a0a0a"
      media="(prefers-color-scheme: dark)"
    />
    <title>Tale documentation</title>
    <meta
      name="description"
      content="Documentation for Tale — the sovereign AI platform."
    />
    <link rel="canonical" href="https://docs.tale.dev/" />
    <meta property="og:url" content="https://docs.tale.dev/" />
    <meta property="og:title" content="Tale documentation" />
    <meta
      property="og:description"
      content="Documentation for Tale — the sovereign AI platform."
    />
    <meta property="og:site_name" content="Tale" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Tale documentation" />
    <meta
      name="twitter:description"
      content="Documentation for Tale — the sovereign AI platform."
    />
    <link
      rel="alternate"
      type="application/rss+xml"
      href="%BASE_URL%llms.txt"
      title="llms.txt"
    />
  </head>
  <body>
    <script>
      // Apply theme synchronously before React hydrates to avoid FOUC.
      // Mirrors logic in @tale/ui ThemeProvider (storage key, system fallback).
      // Also forces favicon + theme-color to match the chosen theme so they
      // follow the user's explicit pick instead of the OS preference.
      (function () {
        try {
          var stored = localStorage.getItem('tale-theme');
          var theme =
            stored === 'light' || stored === 'dark' || stored === 'system'
              ? stored
              : 'system';
          var resolved =
            theme === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : theme;
          var root = document.documentElement;
          if (resolved === 'dark') root.classList.add('dark');
          root.style.colorScheme = resolved;
          var light = document.getElementById('favicon-light');
          var dark = document.getElementById('favicon-dark');
          if (light) light.media = resolved === 'light' ? 'all' : 'not all';
          if (dark) dark.media = resolved === 'dark' ? 'all' : 'not all';
          var tcLight = document.getElementById('theme-color');
          var tcDark = document.getElementById('theme-color-dark');
          if (tcLight) tcLight.media = resolved === 'light' ? 'all' : 'not all';
          if (tcDark) tcDark.media = resolved === 'dark' ? 'all' : 'not all';
        } catch (_e) {
          /* localStorage unavailable; fall through to React default */
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/app/main.tsx"></script>
  </body>
</html>
