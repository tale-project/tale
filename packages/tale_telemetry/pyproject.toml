[project]
name = "tale-telemetry"
version = "0.1.0"
description = "Prometheus telemetry for Tale Python services"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.100.0",
    "prometheus-client>=0.21.0,<1.0.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["tale_telemetry*"]
