[project]
name = "tale-shared"
version = "0.1.0"
description = "Shared infrastructure utilities for Tale Python services"
requires-python = ">=3.11"
dependencies = [
    "loguru>=0.7.0",
    "pydantic-settings>=2.0.0",
    "stamina>=25.0.0",
    "asyncpg>=0.30.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["tale_shared*"]
