[project]
name = "tale-shared"
version = "0.1.0"
description = "Shared infrastructure utilities for Tale Python services"
requires-python = ">=3.11"
dependencies = [
    "loguru==0.7.3",
    "pydantic-settings==2.13.1",
    "stamina==25.2.0",
    "asyncpg==0.31.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["tale_shared*"]
