# =============================================================================
# LOCAL DEVELOPMENT ONLY
# =============================================================================
# This compose file is for LOCAL DEVELOPMENT only. It exposes ports that should
# NEVER be exposed in production (5432, 8001-8003).
#
# For PRODUCTION deployments, use the Tale CLI:
#   tale deploy
#
# The CLI generates secure compose configs inline with only ports 80/443 exposed.
# =============================================================================
#
# Docker Compose configuration for Tale Services
# This file defines the services needed to run the Tale platform
#
# Usage modes:
#   Development (default): docker compose up
#     - Builds images locally from Dockerfiles
#     - Uses PULL_POLICY=build (default)
#
#   Production: Use Tale CLI instead (see above)
#
# Environment variables:
#   PULL_POLICY: 'build' (default) or 'always'
#   VERSION: Image tag to pull (default: 'latest')

services:
  # ============================================================================
  # Tale DB (ParadeDB — pg_search + pgvector)
  # ============================================================================
  db:
    # Image from GHCR (used when PULL_POLICY=always)
    image: ghcr.io/tale-project/tale/tale-db:${VERSION:-latest}
    # Pull policy: 'build' for local dev, 'always' for production
    pull_policy: ${PULL_POLICY:-build}
    # Build configuration (used when PULL_POLICY=build)
    build:
      context: .
      dockerfile: services/db/Dockerfile
      args:
        VERSION: ${VERSION:-dev}

    # Container name
    container_name: tale-db

    # Graceful shutdown: give PostgreSQL enough time to complete
    # checkpoint + WAL flush before Docker sends SIGKILL
    stop_grace_period: 60s

    # Shared memory: ParadeDB extensions may exceed Docker's default 64MB /dev/shm
    shm_size: 256mb

    # Port mapping: host:container
    # Access PostgreSQL at localhost:5432
    ports:
      - '5432:5432'

    # Volume mounts
    # Persist database data
    volumes:
      # PostgreSQL data directory
      - db-data:/var/lib/postgresql/data
      # Backup directory (optional)
      - db-backup:/var/lib/postgresql/backup

    # Environment file
    # Create a .env file in the project root with your database credentials
    env_file:
      - .env

    # Restart policy
    # Automatically restart the container if it crashes
    restart: unless-stopped

    # Health check
    # Gates dependent services on BOTH PostgreSQL accepting connections AND
    # the post-start init scripts having finished (they create `tale_knowledge`
    # + extensions in the background, so `pg_isready` alone races with rag's
    # dbmate startup on slow CI runners).
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-tale} -d ${POSTGRES_DB:-tale} && [ -f /tmp/.db_ready ]',
        ]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 120s

    # Resource limits (optional, adjust based on your needs)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '4'
    #       memory: 8G
    #     reservations:
    #       cpus: '2'
    #       memory: 4G

    # Logging configuration
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

    # Networks
    networks:
      - internal

  # ============================================================================
  # Tale Crawler (Crawl4AI)
  # ============================================================================
  crawler:
    # Image from GHCR (used when PULL_POLICY=always)
    image: ghcr.io/tale-project/tale/tale-crawler:${VERSION:-latest}

    # Container name
    container_name: tale-crawler
    # Pull policy: 'build' for local dev, 'always' for production
    pull_policy: ${PULL_POLICY:-build}
    # Build configuration (used when PULL_POLICY=build)
    build:
      context: .
      dockerfile: services/crawler/Dockerfile
      args:
        VERSION: ${VERSION:-dev}

    # Port mapping: host:container (for development)
    # Access Crawler API at localhost:8002
    ports:
      - '8002:8002'

    # Environment file
    # Create a .env file in the project root with your configuration
    env_file:
      - .env

    # Restart policy
    # Automatically restart the container if it crashes
    restart: unless-stopped

    # Shared memory for Chromium - default 64MB is insufficient for Chrome's
    # inter-process rendering data, causing crashes and orphaned processes.
    shm_size: '1gb'

    # Health check - optimized for faster blue-green deployment
    # Docker will check if the service is healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8002/health']
      interval: 5s
      timeout: 3s
      retries: 2
      start_period: 40s

    # Resource limits (optional, adjust based on your needs)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 4G
    #     reservations:
    #       cpus: '1'
    #       memory: 2G

    # Dependencies
    # Wait for convex to finish seeding agents/workflows/integrations/providers
    # into the shared convex-data volume before mounting it read-only.
    depends_on:
      db:
        condition: service_healthy
      convex:
        condition: service_healthy

    # Volume mounts
    # Persist crawler data (website registry + per-site URL databases)
    volumes:
      - crawler-data:/app/data
      - ${PLATFORM_SHARED_CONFIG:-convex-data}:/app/platform-config:ro

    # Logging configuration
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

    # Networks
    networks:
      - internal

  # ============================================================================
  # Tale RAG
  # ============================================================================
  rag:
    # Image from GHCR (used when PULL_POLICY=always)
    image: ghcr.io/tale-project/tale/tale-rag:${VERSION:-latest}

    # Container name
    container_name: tale-rag
    # Pull policy: 'build' for local dev, 'always' for production
    pull_policy: ${PULL_POLICY:-build}
    # Build configuration (used when PULL_POLICY=build)
    build:
      context: .
      dockerfile: services/rag/Dockerfile
      args:
        VERSION: ${VERSION:-dev}

    # Port mapping: host:container (for development)
    # Access RAG API at localhost:8001
    ports:
      - '8001:8001'

    # Volume mounts
    volumes:
      - rag-data:/app/data
      - ${PLATFORM_SHARED_CONFIG:-convex-data}:/app/platform-config:ro

    # Environment file
    # Create a .env file in the project root with your API keys
    env_file:
      - .env

    # Restart policy
    # Automatically restart the container if it crashes
    restart: unless-stopped

    # Health check - optimized for faster blue-green deployment
    # Docker will check if the service is healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8001/health']
      interval: 5s
      timeout: 3s
      retries: 2
      start_period: 40s

    # Dependencies
    # Wait for convex to finish seeding the shared config volume.
    depends_on:
      db:
        condition: service_healthy
      convex:
        condition: service_healthy

    # Resource limits (optional, adjust based on your needs)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 4G
    #     reservations:
    #       cpus: '1'
    #       memory: 2G

    # Logging configuration
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

    # Networks
    networks:
      - internal

  # ============================================================================
  # Tale Convex (Phase 1: added alongside legacy all-in-one platform; not yet
  # wired into Caddy. See designs: `giggly-napping-honey.md`.)
  # ----------------------------------------------------------------------------
  # This service runs convex-local-backend + Convex Dashboard independently
  # from the platform service. Platform pushes schema & env via HTTP client
  # (`bunx convex deploy --url http://convex:3210`). Convex never restarts for
  # code or env changes; only backend-version upgrades rebuild this image.
  #
  # Phase 1 goal: verify this service runs standalone without disturbing the
  # existing all-in-one platform. Caddy still routes /ws_api etc. to platform.
  # Phase 2 will flip the Caddy upstream and slim the platform container.
  # ============================================================================
  convex:
    image: ghcr.io/tale-project/tale/tale-convex:${VERSION:-latest}
    container_name: tale-convex
    pull_policy: ${PULL_POLICY:-build}
    build:
      context: .
      dockerfile: services/convex/Dockerfile
      args:
        VERSION: ${VERSION:-dev}

    # No ports published — access only via Caddy on the internal network.
    # Ports 3210/3211/6791 remain host-internal to this container.

    # NET_ADMIN: required for the entrypoint's SSRF egress firewall
    # (iptables REJECT rules for IMDS + link-local + RFC1918). Without
    # this cap, the entrypoint logs a warning and skips the firewall —
    # yt-dlp's own DNS resolution then becomes a DNS-rebinding SSRF
    # vector against the host's cloud metadata service (AWS/GCP/Azure).
    cap_add:
      - NET_ADMIN

    # Per-container resource caps. yt-dlp + ffmpeg subprocesses peak
    # ~300-500 MB each; APPLICATION_MAX_CONCURRENT_NODE_ACTIONS=32 means
    # the worst case is 32 parallel ingest jobs. mem_limit caps blast
    # radius; pids_limit defends against fork-bomb regressions; nofile
    # gives breathing room for concurrent yt-dlp + ffmpeg + Convex.
    mem_limit: 12g
    pids_limit: 4096
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    volumes:
      # Independent convex data volume. Once Phase 2 migration completes, this
      # contains everything platform-data previously held under /app/data/.
      - convex-data:/app/data
      # Caddy self-signed CA (for Rust backend → tale.local outbound HTTPS).
      - caddy-data:/caddy-data:ro

    env_file:
      - .env

    restart: unless-stopped

    # Readiness: /version responds as soon as HTTP server binds, but we also
    # require /tmp/convex-ready which entrypoint writes AFTER builtin seed
    # and Dashboard startup. start_period covers cold-boot with search-index
    # warmup; platform's wait_for_http budget is 120s, so align here.
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -sf http://localhost:3210/version && [ -f /tmp/convex-ready ]',
        ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 120s

    depends_on:
      db:
        condition: service_healthy

    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

    networks:
      - internal

  # ============================================================================
  # Tale Platform (TanStack Start + Convex)
  # ============================================================================
  platform:
    # Image from GHCR (used when PULL_POLICY=always)
    image: ghcr.io/tale-project/tale/tale-platform:${VERSION:-latest}

    # Container name
    container_name: tale-platform
    # Pull policy: 'build' for local dev, 'always' for production
    pull_policy: ${PULL_POLICY:-build}
    # Build configuration (used when PULL_POLICY=build)
    build:
      context: .
      dockerfile: services/platform/Dockerfile
      args:
        VERSION: ${VERSION:-dev}

    # No port mapping needed - accessed via proxy at https://tale.local (or your domain)
    # internally via http://platform:3000

    # Volume mounts — Phase 2 split:
    #   * Convex backend + data live in the `convex` service (see convex-data).
    #   * Platform mounts convex-data READ-ONLY so server.ts can:
    #       - watch config JSON changes (TALE_CONFIG_DIR SSE)
    #       - serve branding images from {TALE_CONFIG_DIR}/branding/images
    #   * `caddy-data` CA mount removed — platform makes zero outbound HTTPS.
    volumes:
      - convex-data:/app/data:ro

    # Environment file
    # Create a .env file in the project root with your configuration
    env_file:
      - .env

    # Restart policy
    # Automatically restart the container if it crashes
    restart: unless-stopped

    # Health check — only checks Vite now (Convex is a separate service with
    # its own healthcheck). The /tmp/platform-ready marker is written by
    # entrypoint AFTER env sync + `bunx convex deploy` succeeds.
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -sf http://localhost:3000/api/health && [ -f /tmp/platform-ready ]',
        ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 180s

    # Dependencies
    # Must wait for convex (remote deploy target) AND supporting services.
    depends_on:
      db:
        condition: service_healthy
      convex:
        condition: service_healthy
      rag:
        condition: service_healthy
      crawler:
        condition: service_healthy
      proxy:
        condition: service_healthy

    # Resource limits (optional, adjust based on your needs)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 4G
    #     reservations:
    #       cpus: '1'
    #       memory: 2G

    # Logging configuration
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

    # Networks
    networks:
      - internal

  # ============================================================================
  # Tale Proxy (Caddy)
  # ============================================================================
  # Single entry point for all traffic (both local dev and production)
  # Always serves over HTTPS with configurable certificate source.
  #
  # TLS Configuration (set in .env):
  #   TLS_MODE=selfsigned   - Self-signed certs (default, for development)
  #   TLS_MODE=letsencrypt  - Let's Encrypt certs (for production)
  #
  # For local development:
  #   - Run: docker compose up
  #   - Access: https://tale.local (self-signed cert, browser warning expected)
  #   - To trust certs: docker exec tale-proxy caddy trust
  #
  # For production with HTTPS:
  #   - Set HOST=yourdomain.com and SITE_URL=https://yourdomain.com in .env
  #   - Set TLS_MODE=letsencrypt
  #   - Access: https://yourdomain.com (trusted Let's Encrypt cert)
  #
  proxy:
    # Image from GHCR (used when PULL_POLICY=always)
    image: ghcr.io/tale-project/tale/tale-proxy:${VERSION:-latest}
    # Pull policy: 'build' for local dev, 'always' for production
    pull_policy: ${PULL_POLICY:-build}
    # Build configuration (used when PULL_POLICY=build)
    build:
      context: .
      dockerfile: services/proxy/Dockerfile
      args:
        VERSION: ${VERSION:-dev}

    # Container name
    container_name: tale-proxy

    # Port mapping: host:container
    # Access the platform via HTTP (80) or HTTPS (443)
    ports:
      - '80:80'
      - '443:443'

    # Volume mounts
    # Persist Caddy data (certificates, etc.)
    volumes:
      # Caddy data directory for certificates and configuration
      - caddy-data:/data
      # Caddy config directory
      - caddy-config:/config

    # Environment file
    # Create a .env file in the project root with your domain configuration
    env_file:
      - .env

    # Restart policy
    # Automatically restart the container if it crashes
    restart: unless-stopped

    # Health check via dedicated internal port (not exposed externally)
    # Uses :2020 to avoid interfering with Caddy's ACME challenge handling on :80
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://127.0.0.1:2020/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Note: platform depends on proxy (see platform.depends_on above).
    # Caddy handles upstream unavailability gracefully.

    # Logging configuration
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

    # Networks
    networks:
      internal:
        # Hairpin NAT resolution via network alias
        # This allows containers to resolve HOST to the proxy container
        # via Docker's internal DNS, solving the hairpin NAT issue.
        # Use app.localhost (or another real hostname) instead of localhost
        # because localhost is always in /etc/hosts and can't be overridden.
        aliases:
          - ${HOST:-tale.local}

  # ============================================================================
  # Tale Sandbox Egress (tinyproxy) — HTTPS forward proxy
  # ----------------------------------------------------------------------------
  # Filters CONNECT host requests against an allow-list of package registries
  # (pypi.org, files.pythonhosted.org, registry.npmjs.org, github package
  # endpoints). Sandbox runtime containers reach pypi/npm via this proxy; all
  # other internet is unreachable because the sandbox bridge is `internal:true`.
  # See plan §2.
  # ============================================================================
  sandbox-egress:
    image: ghcr.io/tale-project/tale/tale-sandbox-egress:${VERSION:-latest}
    pull_policy: ${PULL_POLICY:-build}
    build:
      context: services/sandbox-egress
      dockerfile: Dockerfile
    container_name: tale-sandbox-egress
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'nc', '-z', '127.0.0.1', '3128']
      interval: 10s
      timeout: 3s
      retries: 2
      start_period: 5s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      # `sandbox` is internal-only — only sandbox-egress + the per-call
      # runtime containers attach. Runtime containers reach pypi/npm by
      # CONNECT to sandbox-egress:3128, which is on BOTH networks. The
      # `internal` Tale network is a regular bridge with NAT so tinyproxy
      # can resolve and reach the upstream registries.
      - sandbox
      - internal

  # ============================================================================
  # Tale Sandbox Spawner — thin stateless docker-run service for `code_run`
  # ----------------------------------------------------------------------------
  # Mounts /var/run/docker.sock to spawn ephemeral sibling containers per call.
  # Reachable only on the `internal` bridge by the platform/convex service;
  # joined to `sandbox` only to issue `docker run` (the runtime containers
  # themselves attach to `sandbox` for egress via tinyproxy).
  #
  # SECURITY: docker.sock = host root. Explicit threat acceptance per plan
  # "Security model". Spawner accepts only HMAC-signed typed JSON over HTTP;
  # `services/sandbox/src/docker_args.ts` validates every argv field with
  # regexes so a malformed input never reaches `docker run`. Future hardening:
  # SANDBOX_RUNTIME=runsc opt-in (gVisor), `opa-docker-authz` daemon plugin
  # for HostConfig body filtering, dockerd userns-remap.
  # ============================================================================
  sandbox:
    image: ghcr.io/tale-project/tale/tale-sandbox:${VERSION:-latest}
    pull_policy: ${PULL_POLICY:-build}
    build:
      context: services/sandbox
      dockerfile: Dockerfile
    container_name: tale-sandbox
    env_file:
      - .env
    environment:
      SANDBOX_RUNTIME: ${SANDBOX_RUNTIME:-runc}
      SANDBOX_RUNTIME_IMAGE: ${SANDBOX_RUNTIME_IMAGE:-tale-sandbox-runtime:latest}
      SANDBOX_EGRESS_NETWORK: tale-sandbox-net
      SANDBOX_EGRESS_PROXY: http://sandbox-egress:3128
    volumes:
      # The spawner needs the host docker socket to spawn sibling containers.
      # This is the security boundary — see header comment.
      - /var/run/docker.sock:/var/run/docker.sock
      # 1:1 bind: per-call workspace dirs are created here by the spawner
      # and mounted into the runtime container at the SAME host path (the
      # docker daemon resolves --mount source paths against the host fs,
      # so the spawner and the daemon must agree on the path).
      - /var/lib/tale-sandbox:/var/lib/tale-sandbox
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:8003/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      sandbox-egress:
        condition: service_healthy
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - internal
      - sandbox

# ============================================================================
# Volumes
# ============================================================================
volumes:
  # Tale DB persistent storage
  db-data:
    driver: local
    # Optional: Use named volume with specific driver options
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /path/to/db/data

  # Tale DB backup storage
  db-backup:
    driver: local

  # Persistent storage for RAG service data (temp files, document processing)
  rag-data:
    driver: local

  # Persistent storage for all platform data (Convex DB, agents, workflows, integrations)
  # LEGACY: once `tale migrate split-convex` has run, data lives in convex-data.
  # This volume is preserved in case users need to rollback; safe to remove
  # manually after a successful Phase 2 upgrade.
  platform-data:
    driver: local

  # Persistent storage for the Convex service (Phase 1+). Holds the Convex
  # local-backend DB (SQLite or pg-local), search indexes, uploaded files,
  # and seeded file-based configs (agents/workflows/integrations/providers).
  convex-data:
    driver: local

  # Persistent storage for Caddy proxy data (certificates, etc.)
  caddy-data:
    driver: local

  # Persistent storage for Caddy proxy configuration
  caddy-config:
    driver: local

  # Persistent storage for Crawler data (website registry + per-site URL databases)
  crawler-data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  # Internal network for Tale services
  internal:
    driver: bridge

  # Sandbox network — internal-only bridge for code_run runtime containers + the
  # tinyproxy egress sidecar. The CLI (start.ts / deploy.ts via
  # ensureSandboxNetwork) pre-creates the network with `--internal --ipv6=false`
  # so it can carry both `tale-sandbox-net` and the bridge-driver flags that
  # compose's `networks:` block can't express atomically. We mark it external
  # here so compose attaches to the existing network rather than overwriting
  # its driver options.
  sandbox:
    external: true
    name: tale-sandbox-net
