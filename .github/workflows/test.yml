name: Test

on:
  pull_request:
    branches:
      - main
    paths:
      - 'services/platform/**'
      - 'services/crawler/**'
      - 'services/rag/**'
      - 'packages/**'
      - 'services/db/**'
      - 'services/proxy/**'
      - 'tools/cli/**'
      - 'docs/**'
      - 'README.md'
      - 'README.de.md'
      - 'README.fr.md'
      - '.github/workflows/test.yml'
      - '.github/actions/setup-turbo/**'
      - 'package.json'
      - 'bun.lock'
      - 'turbo.json'
      - 'tsconfig.base.json'
  push:
    branches:
      - main
    paths:
      - 'services/platform/**'
      - 'services/crawler/**'
      - 'services/rag/**'
      - 'packages/**'
      - 'services/db/**'
      - 'services/proxy/**'
      - 'tools/cli/**'
      - 'docs/**'
      - 'README.md'
      - 'README.de.md'
      - 'README.fr.md'
      - '.github/workflows/test.yml'
      - '.github/actions/setup-turbo/**'
      - 'package.json'
      - 'bun.lock'
      - 'turbo.json'
      - 'tsconfig.base.json'
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_API: 'http://127.0.0.1:9080'
  TURBO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  TURBO_TEAM: 'tale'

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests via Turborepo.
  # ---------------------------------------------------------------------------
  test:
    name: Unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup toolchain
        uses: ./.github/actions/setup-turbo
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: bunx turbo run test

  # ---------------------------------------------------------------------------
  # UI tests. Draft PRs skip.
  # ---------------------------------------------------------------------------
  test-ui:
    name: UI
    if: github.event.pull_request.draft != true
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b # v1

      - name: Setup toolchain
        uses: ./.github/actions/setup-turbo
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          install-python: 'false'

      - name: Run UI tests
        run: bunx turbo run test:ui
