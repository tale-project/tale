name: Test

on:
  pull_request:
    branches:
      - main
    paths:
      - 'services/platform/**'
      - 'services/crawler/**'
      - 'services/rag/**'
      - 'packages/**'
      - 'services/db/**'
      - 'services/proxy/**'
      - 'tools/cli/**'
      - '.github/workflows/test.yml'
      - '.github/actions/setup-turbo/**'
      - 'package.json'
      - 'bun.lock'
      - 'turbo.json'
      - 'tsconfig.base.json'
  push:
    branches:
      - main
    paths:
      - 'services/platform/**'
      - 'services/crawler/**'
      - 'services/rag/**'
      - 'packages/**'
      - 'services/db/**'
      - 'services/proxy/**'
      - 'tools/cli/**'
      - '.github/workflows/test.yml'
      - '.github/actions/setup-turbo/**'
      - 'package.json'
      - 'bun.lock'
      - 'turbo.json'
      - 'tsconfig.base.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_API: 'http://127.0.0.1:9080'
  TURBO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  TURBO_TEAM: 'tale'

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests via Turborepo.
  # ---------------------------------------------------------------------------
  test:
    name: Unit
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: useblacksmith/checkout@v1

      - name: Setup toolchain
        uses: ./.github/actions/setup-turbo
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: bunx turbo run test

  # ---------------------------------------------------------------------------
  # UI tests (browser / component).
  # ---------------------------------------------------------------------------
  test-ui:
    name: UI
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: useblacksmith/checkout@v1

      - name: Setup toolchain
        uses: ./.github/actions/setup-turbo
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          install-python: 'false'

      - name: Run UI tests
        run: bunx turbo run test:ui
