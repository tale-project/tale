name: CLI

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to attach binary to (e.g., v1.0.0)'
        required: true
        type: string
  push:
    branches:
      - main
    paths:
      - 'tools/cli/**'
      - '.github/workflows/cli.yml'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the version string for the build matrix.
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 3
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          else
            VERSION="dev"
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Build the CLI binary for each target platform.
  # linux -> Blacksmith (cheap+fast). macos/windows -> GitHub-hosted.
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.platform }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-4vcpu-ubuntu-2404
            platform: linux
            build_script: build:linux
            binary: tale
            artifact: tale_linux
          - os: macos-latest
            platform: macos
            build_script: build:mac
            binary: tale
            artifact: tale_macos
          - os: windows-latest
            platform: windows
            build_script: build:windows
            binary: tale.exe
            artifact: tale_windows.exe

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.12'

      - name: Restore Bun install cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-1.3.12-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-1.3.12-

      - name: Install dependencies
        working-directory: tools/cli
        run: bun install --frozen-lockfile

      - name: Generate embedded files
        working-directory: tools/cli
        run: bun run generate

      - name: Run type check
        if: matrix.platform == 'linux'
        working-directory: tools/cli
        run: bun run typecheck

      - name: Inject version into package.json
        working-directory: tools/cli
        run: |
          jq '.version = "${{ needs.prepare.outputs.version }}"' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Build binary
        working-directory: tools/cli
        run: bun run ${{ matrix.build_script }}

      - name: Rename binary
        working-directory: tools/cli/dist
        run: mv ${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Verify binary
        working-directory: tools/cli/dist
        run: |
          if [ "${{ matrix.platform }}" != "windows" ]; then
            chmod +x ${{ matrix.artifact }}
          fi
          ./${{ matrix.artifact }} --version

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact }}
          path: tools/cli/dist/${{ matrix.artifact }}
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Attach built binaries to the GitHub release (dispatch only).
  # ---------------------------------------------------------------------------
  release:
    name: Attach to release
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Wait for release to exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          REPO="${{ github.repository }}"
          MAX_ATTEMPTS=10
          DELAY=15
          for i in $(seq 1 $MAX_ATTEMPTS); do
            if gh release view "$TAG" --repo "$REPO" > /dev/null 2>&1; then
              echo "Release $TAG found."
              exit 0
            fi
            echo "Release $TAG not found yet (attempt $i/$MAX_ATTEMPTS). Waiting ${DELAY}s..."
            sleep $DELAY
            DELAY=$((DELAY * 2 > 120 ? 120 : DELAY * 2))
          done
          echo "::error::Release $TAG not found after $MAX_ATTEMPTS attempts."
          exit 1

      - name: Upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.inputs.release_tag }} \
            artifacts/tale_linux/* \
            artifacts/tale_macos/* \
            artifacts/tale_windows.exe/* \
            --repo ${{ github.repository }} \
            --clobber
