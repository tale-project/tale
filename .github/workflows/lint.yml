name: Lint

on:
  pull_request:
    branches:
      - main
    paths:
      - 'services/platform/**'
      - 'services/crawler/**'
      - 'services/rag/**'
      - 'packages/**'
      - 'services/db/**'
      - 'services/proxy/**'
      - 'tools/cli/**'
      - 'docs/**'
      - '.agents/**'
      - 'AGENTS.md'
      - 'README.md'
      - 'README.de.md'
      - 'README.fr.md'
      - '.github/pull_request_template.md'
      - '.github/workflows/lint.yml'
      - '.github/actions/setup-turbo/**'
      - 'package.json'
      - 'bun.lock'
      - 'turbo.json'
      - 'knip.config.ts'
      - '.oxlintrc.json'
      - '.oxfmtrc.json'
      - 'tsconfig.base.json'
  push:
    branches:
      - main
    paths:
      - 'services/platform/**'
      - 'services/crawler/**'
      - 'services/rag/**'
      - 'packages/**'
      - 'services/db/**'
      - 'services/proxy/**'
      - 'tools/cli/**'
      - 'docs/**'
      - '.agents/**'
      - 'AGENTS.md'
      - 'README.md'
      - 'README.de.md'
      - 'README.fr.md'
      - '.github/pull_request_template.md'
      - '.github/workflows/lint.yml'
      - '.github/actions/setup-turbo/**'
      - 'package.json'
      - 'bun.lock'
      - 'turbo.json'
      - 'knip.config.ts'
      - '.oxlintrc.json'
      - '.oxfmtrc.json'
      - 'tsconfig.base.json'
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_API: 'http://127.0.0.1:9080'
  TURBO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  TURBO_TEAM: 'tale'

jobs:
  # ---------------------------------------------------------------------------
  # oxlint across the monorepo via Turborepo.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup toolchain
        uses: ./.github/actions/setup-turbo
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run lint
        run: bunx turbo run lint

  # ---------------------------------------------------------------------------
  # oxfmt + turbo format:check — fast enough for a 2vCPU runner.
  # ---------------------------------------------------------------------------
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup toolchain
        uses: ./.github/actions/setup-turbo
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run format check
        run: bun run format:check

  # ---------------------------------------------------------------------------
  # tsc --noEmit across workspaces. Memory-sensitive, keep at 4vCPU.
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type check
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b # v1

      - name: Setup toolchain
        uses: ./.github/actions/setup-turbo
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          install-python: 'false'

      - name: Run type check
        run: bunx turbo run typecheck

  # ---------------------------------------------------------------------------
  # Unused-code scan. Light CPU, 2vCPU is plenty.
  # ---------------------------------------------------------------------------
  knip:
    name: Knip
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup toolchain
        uses: ./.github/actions/setup-turbo
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          install-python: 'false'
          start-turbo-cache: 'false'

      - name: Run knip
        run: bun run knip:check
