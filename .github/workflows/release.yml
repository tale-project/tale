name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '[0-9]*.*.*'

  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

# Releases must not cancel mid-flight (partial manifests would break deploys).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the version string used by every downstream job.
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_number: ${{ steps.version.outputs.version_number }}

    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          VERSION_NUMBER="${VERSION#v}"
          echo "version=v${VERSION_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "version_number=${VERSION_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "## Release Version" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version Number**: ${{ steps.version.outputs.version_number }}" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Build and push each service image per architecture on native runners.
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.service.name }} (${{ matrix.arch.name }})
    needs: prepare
    runs-on: ${{ matrix.arch.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        service:
          - { name: platform }
          - { name: rag }
          - { name: crawler }
          - { name: db }
          - { name: proxy }
          - { name: convex }
          - { name: web }
          - { name: docs }
        arch:
          - { name: amd64, runner: ubuntu-latest, platform: linux/amd64 }
          - { name: arm64, runner: ubuntu-24.04-arm, platform: linux/arm64 }

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Reclaim disk space
        if: matrix.service.name == 'platform' || matrix.service.name == 'rag' || matrix.service.name == 'crawler' || matrix.service.name == 'convex'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af

      - name: Setup Docker builder
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build metadata
        id: meta
        run: |
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "revision=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: services/${{ matrix.service.name }}/Dockerfile
          platforms: ${{ matrix.arch.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/tale-${{ matrix.service.name }}:${{ needs.prepare.outputs.version_number }}-${{ matrix.arch.name }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version_number }}
          labels: |
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.revision }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          provenance: false

  # ---------------------------------------------------------------------------
  # Gate: validate built images with the same tests CI runs on PRs.
  # ---------------------------------------------------------------------------
  container-test:
    name: Container test gate
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Reclaim disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull release images
        run: |
          VERSION="${{ needs.prepare.outputs.version_number }}"
          ARCH="amd64"
          for svc in platform rag crawler db proxy convex web docs; do
            IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/tale-${svc}:${VERSION}-${ARCH}"
            echo "Pulling ${IMAGE}..."
            docker pull "${IMAGE}"
            docker tag "${IMAGE}" "ghcr.io/tale-project/tale/tale-${svc}:latest"
          done

      - name: Run image validation
        run: |
          export PULL_POLICY=never
          bash tests/container-image-test.sh

      - name: Run smoke tests
        run: |
          export PULL_POLICY=never
          export SKIP_BUILD=true
          bash tests/container-smoke-test.sh
        env:
          SMOKE_TEST_TIMEOUT: 300

      - name: Run web container test
        run: |
          export PULL_POLICY=never
          export SKIP_BUILD=true
          bash tests/container-web-test.sh

      - name: Run docs container test
        run: |
          export PULL_POLICY=never
          export SKIP_BUILD=true
          bash tests/container-docs-test.sh

      - name: Summary
        if: always()
        run: |
          echo "## Container Test Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "Release images validated for ${{ needs.prepare.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Create multi-arch manifests (:version and :latest) per service.
  # ---------------------------------------------------------------------------
  manifest:
    name: Manifest ${{ matrix.service }}
    needs: [prepare, build, container-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write

    strategy:
      matrix:
        service: [platform, rag, crawler, db, proxy, convex, web, docs]

    steps:
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/tale-${{ matrix.service }}"
          VERSION="${{ needs.prepare.outputs.version_number }}"

          docker manifest create ${IMAGE}:${VERSION} \
            ${IMAGE}:${VERSION}-amd64 \
            ${IMAGE}:${VERSION}-arm64

          docker manifest create ${IMAGE}:latest \
            ${IMAGE}:${VERSION}-amd64 \
            ${IMAGE}:${VERSION}-arm64

          docker manifest push ${IMAGE}:${VERSION}
          docker manifest push ${IMAGE}:latest

          echo "### ${{ matrix.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: ${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Revision**: ${GITHUB_SHA}" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Create the GitHub release after manifests are verified.
  # ---------------------------------------------------------------------------
  create-release:
    name: Create release
    needs: [prepare, manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Verify manifests are pullable
        run: |
          VERSION="${{ needs.prepare.outputs.version_number }}"
          REGISTRY="${{ env.REGISTRY }}/${{ github.repository }}"
          for svc in platform rag crawler db proxy convex web docs; do
            IMAGE="${REGISTRY}/tale-${svc}:${VERSION}"
            echo "Verifying manifest: ${IMAGE}"
            docker manifest inspect "${IMAGE}" > /dev/null 2>&1 || {
              echo "::error::Manifest not found: ${IMAGE}"
              exit 1
            }
          done
          echo "All service manifests verified"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ needs.prepare.outputs.version }} \
            --title "Tale ${{ needs.prepare.outputs.version }}" \
            --generate-notes \
            || echo "Release already exists, skipping creation"

  # ---------------------------------------------------------------------------
  # Kick off the CLI build workflow to attach binaries to the release.
  # ---------------------------------------------------------------------------
  trigger-cli:
    name: Trigger CLI build
    needs: [prepare, manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: write
      contents: read

    steps:
      - name: Dispatch CLI workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run cli.yml \
            --repo ${{ github.repository }} \
            --field release_tag=${{ needs.prepare.outputs.version }}

  # ---------------------------------------------------------------------------
  # Final summary for the release.
  # ---------------------------------------------------------------------------
  summary:
    name: Summary
    needs: [prepare, create-release, manifest, trigger-cli]
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Write summary
        run: |
          echo "## Release ${{ needs.prepare.outputs.version }} Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All 8 service images have been built, tested, and pushed to GHCR (native amd64 + arm64)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Image |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          for svc in platform rag crawler db proxy convex web docs; do
            echo "| ${svc} | \`${{ env.REGISTRY }}/${{ github.repository }}/tale-${svc}:${{ needs.prepare.outputs.version_number }}\` |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### CLI" >> "$GITHUB_STEP_SUMMARY"
          echo "CLI build workflow has been triggered with tag \`${{ needs.prepare.outputs.version }}\`." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Deploy Command" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "./scripts/deploy.sh deploy ${{ needs.prepare.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
