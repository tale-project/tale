name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '[0-9]*.*.*'

  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Prepare release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_number: ${{ steps.version.outputs.version_number }}

    steps:
      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          VERSION_NUMBER="${VERSION#v}"
          echo "version=v${VERSION_NUMBER}" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION_NUMBER}" >> $GITHUB_OUTPUT

      - name: Log version
        run: |
          echo "## Release Version" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Number**: ${{ steps.version.outputs.version_number }}" >> $GITHUB_STEP_SUMMARY

  create-release:
    name: Create release
    needs: prepare
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ needs.prepare.outputs.version }} \
            --title "Tale ${{ needs.prepare.outputs.version }}" \
            --generate-notes \
            || echo "Release already exists, skipping creation"

  build:
    name: Build ${{ matrix.service.name }} (${{ matrix.arch.name }})
    needs: prepare
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: platform
            context: '.'
          - name: rag
            context: '.'
          - name: crawler
            context: '.'
          - name: db
            context: '.'
          - name: proxy
            context: '.'
        arch:
          - name: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - name: arm64
            runner: blacksmith-4vcpu-ubuntu-2404-arm
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Free disk space
        if: matrix.service.name == 'platform' || matrix.service.name == 'rag' || matrix.service.name == 'crawler'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build metadata
        id: meta
        run: |
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "revision=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: useblacksmith/build-push-action@v2
        with:
          context: ${{ matrix.service.context }}
          file: services/${{ matrix.service.name }}/Dockerfile
          platforms: ${{ matrix.arch.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/tale-${{ matrix.service.name }}:${{ needs.prepare.outputs.version_number }}-${{ matrix.arch.name }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version_number }}
          labels: |
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.revision }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.service.name }}-release
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}-release

  # ===========================================================================
  # Container Test Gate — validates images before manifest creation
  # ===========================================================================
  container-test:
    name: Container test gate
    needs: [prepare, build]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: read
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull release images for testing
        run: |
          VERSION="${{ needs.prepare.outputs.version_number }}"
          ARCH="amd64"
          for svc in platform rag crawler db proxy; do
            IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/tale-${svc}:${VERSION}-${ARCH}"
            echo "Pulling ${IMAGE}..."
            docker pull "${IMAGE}"
            # Tag as the image name compose.yml expects so smoke tests can find them
            docker tag "${IMAGE}" "ghcr.io/tale-project/tale/tale-${svc}:latest"
          done

      - name: Run image validation tests
        run: |
          # Override compose to use pre-pulled images instead of building
          export PULL_POLICY=never
          bash tests/container-image-test.sh

      - name: Run container smoke tests
        run: |
          export PULL_POLICY=never
          export SKIP_BUILD=true
          bash tests/container-smoke-test.sh
        env:
          SMOKE_TEST_TIMEOUT: 300

      - name: Container test summary
        if: always()
        run: |
          echo "## Container Test Gate" >> $GITHUB_STEP_SUMMARY
          echo "Release images validated for ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY

  manifest:
    name: Manifest ${{ matrix.service }}
    needs: [prepare, build, container-test]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      packages: write

    strategy:
      matrix:
        service: [platform, rag, crawler, db, proxy]

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/tale-${{ matrix.service }}"
          VERSION="${{ needs.prepare.outputs.version_number }}"
          CREATED="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          REVISION="${GITHUB_SHA}"

          docker manifest create ${IMAGE}:${VERSION} \
            ${IMAGE}:${VERSION}-amd64 \
            ${IMAGE}:${VERSION}-arm64

          docker manifest create ${IMAGE}:latest \
            ${IMAGE}:${VERSION}-amd64 \
            ${IMAGE}:${VERSION}-arm64

          docker manifest push ${IMAGE}:${VERSION}
          docker manifest push ${IMAGE}:latest

          echo "### ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Created**: ${CREATED}" >> $GITHUB_STEP_SUMMARY
          echo "- **Revision**: ${REVISION}" >> $GITHUB_STEP_SUMMARY

  trigger-cli:
    name: Trigger CLI build
    needs: [prepare, create-release]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      actions: write
      contents: read

    steps:
      - name: Trigger CLI workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run cli.yml \
            --repo ${{ github.repository }} \
            --field release_tag=${{ needs.prepare.outputs.version }}

  summary:
    name: Release summary
    needs: [prepare, create-release, manifest, trigger-cli]
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Generate summary
        run: |
          echo "## Release ${{ needs.prepare.outputs.version }} Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All 5 service images have been built, tested, and pushed to GHCR (native amd64 + arm64)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | \`${{ env.REGISTRY }}/${{ github.repository }}/tale-platform:${{ needs.prepare.outputs.version_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| RAG | \`${{ env.REGISTRY }}/${{ github.repository }}/tale-rag:${{ needs.prepare.outputs.version_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Crawler | \`${{ env.REGISTRY }}/${{ github.repository }}/tale-crawler:${{ needs.prepare.outputs.version_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| DB | \`${{ env.REGISTRY }}/${{ github.repository }}/tale-db:${{ needs.prepare.outputs.version_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Proxy | \`${{ env.REGISTRY }}/${{ github.repository }}/tale-proxy:${{ needs.prepare.outputs.version_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### CLI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "CLI build workflow has been triggered with tag \`${{ needs.prepare.outputs.version }}\`." >> $GITHUB_STEP_SUMMARY
          echo "The CLI binaries will be uploaded to the release once the build completes." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deploy Command" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "./scripts/deploy.sh deploy ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
