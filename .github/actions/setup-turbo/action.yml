name: Setup Turbo
description: Installs Bun, Python, uv, dependencies, and starts turbo cache server

inputs:
  bun-version:
    description: Bun version
    default: '1.3.10'
  python-version:
    description: Python version
    default: '3.11'
  github-token:
    description: GitHub token for turbo cache
    required: true

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Install dependencies
      shell: bash
      run: bun install

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Start Turbo cache server
      uses: felixmosh/turborepo-gh-artifacts@v3
      with:
        repo-token: ${{ inputs.github-token }}
