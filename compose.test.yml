# =============================================================================
# CONTAINER E2E TESTING ONLY
# =============================================================================
# Override compose.yml with non-conflicting ports for CI and local testing.
# Avoids collisions with any existing services on the host.
#
# NOTE: Does NOT use !reset YAML tag (requires Docker Compose v2.24.6+)
# because it clears the entire ports array. Instead, we add test-specific ports.
# The original ports from compose.yml are also preserved but don't cause issues
# in CI (where nothing else runs). For LOCAL testing, stop conflicting services
# before running: docker stop antigravity_db nomino-ai-gateway-dev
#
# Usage:
#   docker compose -f compose.yml -f compose.test.yml --env-file .env.test -p tale-test up -d --build
#   docker compose -f compose.yml -f compose.test.yml --env-file .env.test -p tale-test down -v
#
# Or via the convenience script:
#   bash tests/container-smoke-test.sh
#   bun run docker:test

services:
  db:
    env_file:
      - .env.test
    ports:
      - '15432:5432'

  crawler:
    env_file:
      - .env.test
    ports:
      - '18002:8002'
    volumes:
      - ./tests/fixtures/platform-config:/app/platform-config:ro
    # Dbmate (public_web schema) runs at container start before uvicorn, so
    # the fresh-DB path — pg_search BM25 index creation + 2 migrations — can
    # exceed the 40s compose.yml start_period on a cold CI runner. Match the
    # convex/platform tolerance pattern.
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8002/health']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 120s

  rag:
    env_file:
      - .env.test
    ports:
      - '18001:8001'
    volumes:
      - ./tests/fixtures/platform-config:/app/platform-config:ro
    # Same rationale as crawler: dbmate (private_knowledge schema, 10
    # migrations including BM25 index) precedes uvicorn, so give the
    # fresh-DB boot room under slow runners.
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8001/health']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 120s

  # Phase 2 (split): convex service gets its own test port mapping + health.
  convex:
    env_file:
      - .env.test
    ports:
      # Expose Convex backend + dashboard for direct CI probes.
      - '13210:3210'
      - '13211:3211'
      - '16791:6791'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -sf http://localhost:3210/version && [ -f /tmp/convex-ready ] || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 180s

  platform:
    env_file:
      - .env.test
    # Platform is a thin client now — Vite + deploy marker only.
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -sf http://localhost:3000/api/health && [ -f /tmp/platform-ready ] || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 300s
    ports:
      - '13000:3000'

  proxy:
    env_file:
      - .env.test
    ports:
      - '10080:80'
      - '10443:443'
